<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}后台管理{% endblock %} — Demo 展示</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/admin.css" />
</head>
<body class="admin-body">
  <header class="admin-header">
    <div class="container admin-header-inner">
      <a class="logo" href="/admin">Demo<span class="accent">Showcase</span> 后台</a>
      <nav class="admin-nav">
        <a href="/admin/categories">分类管理</a>
        <a href="/admin/demos">Demo 管理</a>
        <a href="/" target="_blank">查看前台</a>
        <form action="/admin/logout" method="post" class="inline-form">
          <button type="submit" class="link-button">退出登录</button>
        </form>
      </nav>
    </div>
  </header>

  <main class="container admin-main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
