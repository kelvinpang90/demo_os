{% extends "admin/base.html" %}

{% block title %}{{ "编辑分类" if category else "新增分类" }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ "编辑分类" if category else "新增分类" }}</h1>
  <a href="/admin/categories">&larr; 返回列表</a>
</div>

{% if error %}
<p class="form-error">{{ error }}</p>
{% endif %}

<form
  class="admin-form"
  method="post"
  action="{{ '/admin/categories/%d/edit' % category.id if category else '/admin/categories/new' }}"
>
  <label>
    名称
    <input type="text" name="name" value="{{ category.name if category else '' }}" required />
  </label>
  <label>
    Slug
    <input type="text" name="slug" value="{{ category.slug if category else '' }}" required />
  </label>
  <label>
    排序
    <input type="number" name="sort_order" value="{{ category.sort_order if category else 0 }}" />
  </label>
  <label>
    描述（可选）
    <textarea name="description" rows="3">{{ category.description or '' if category else '' }}</textarea>
  </label>
  <button type="submit" class="cta-button">保存</button>
</form>
{% endblock %}
