# Demo 展示网站 vhost 模版
# 部署到 VPS 后复制到 /srv/infra/nginx/conf.d/demo_os.conf
# （域名已写死为 demo.acuventech.com，如有变化请同步修改）

server {
    listen 80;
    server_name demo.acuventech.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name demo.acuventech.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 后台支持上传 ZIP 形式的 Demo 包，放宽请求体大小限制
    client_max_body_size 200M;

    # 用变量驱动 proxy_pass，由 nginx.conf 里的 resolver（Docker 127.0.0.11）
    # 每次请求重新解析容器 IP，避免容器重建后 nginx 缓存旧 IP 返回 502。
    set $demo_os_backend "demo_os_backend:8000";

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health {
        access_log off;
        proxy_pass http://$demo_os_backend/health;
        proxy_set_header Host $host;
    }

    # 单容器架构：FastAPI 同时托管前台/后台页面、静态文件与 /demos、/thumbnails 静态资源。
    # 全部请求直接转发给 demo_os_backend，无需拆分 location。
    location / {
        proxy_pass http://$demo_os_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
    }
}
