services:
  app:
    build: .
    image: ${IMAGE:-demo-os:latest}
    container_name: demo_os_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/demos:/app/data/demos
      - ./data/thumbnails:/app/data/thumbnails
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - default
      - data_net
      - proxy_net

networks:
  # MySQL 容器所在的网络
  data_net:
    external: true
    name: data_net
  # nginx 反向代理所在的网络，nginx 通过容器名 demo_os_backend:8000 访问本服务。
  proxy_net:
    external: true
    name: proxy_net
